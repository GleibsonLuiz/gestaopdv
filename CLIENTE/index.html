<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Novo Cliente — Cadastro</title>
<style>
  :root {
    --bg:        oklch(17% 0.028 252);
    --bg-2:      oklch(20% 0.032 252);
    --surface:   oklch(23% 0.030 252);
    --surface-2: oklch(27% 0.028 252);
    --field:     oklch(21% 0.028 252);
    --field-hov: oklch(24% 0.030 252);
    --fg:        oklch(97% 0.008 85);
    --muted:     oklch(70% 0.018 245);
    --muted-2:   oklch(55% 0.020 245);
    --border:    oklch(33% 0.024 252);
    --border-2:  oklch(40% 0.026 252);
    --accent:    oklch(82% 0.115 88);   /* champagne */
    --accent-2:  oklch(74% 0.135 78);   /* gold */
    --accent-ink:oklch(22% 0.040 75);   /* ink on gold */
    --danger:    oklch(64% 0.190 25);
    --ok:        oklch(72% 0.130 155);

    --font-display: 'Cormorant Garamond', 'Iowan Old Style', 'Charter', Georgia, 'Times New Roman', serif;
    --font-body:    'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-mono:    ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace;

    --radius: 14px;
    --radius-sm: 10px;
    --radius-input: 10px;

    --shadow-soft:  0 1px 0 oklch(100% 0 0 / 0.03) inset, 0 30px 80px -20px oklch(0% 0 0 / 0.55), 0 8px 24px -8px oklch(0% 0 0 / 0.45);
    --ring: 0 0 0 1px oklch(82% 0.115 88 / 0.55), 0 0 0 4px oklch(82% 0.115 88 / 0.14);
  }

  *,*::before,*::after{ box-sizing:border-box }
  html,body{ height:100% }
  body{
    margin:0;
    font-family: var(--font-body);
    color: var(--fg);
    background:
      radial-gradient(1200px 700px at 20% -10%, oklch(28% 0.045 260 / 0.55), transparent 60%),
      radial-gradient(900px 600px at 110% 110%, oklch(26% 0.05 230 / 0.45), transparent 55%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height:100svh;
    display:grid; place-items:center;
    padding: clamp(16px, 4vw, 56px);
  }

  /* Decorative noise — extremely subtle */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; opacity:.035; mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='4'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.6'/></svg>");
  }

  .stage{
    width:min(820px, 100%);
    position:relative;
  }

  /* Eyebrow above card */
  .eyebrow{
    display:flex; align-items:center; gap:14px;
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
    color: var(--muted-2);
    margin: 0 6px 14px;
  }
  .eyebrow .dot{ width:6px; height:6px; border-radius:999px; background: var(--accent); box-shadow: 0 0 0 4px oklch(82% 0.115 88 / 0.10) }
  .eyebrow .grow{ flex:1; height:1px; background: linear-gradient(90deg, var(--border) 0%, transparent 100%) }

  .card{
    position:relative;
    background:
      linear-gradient(180deg, oklch(25% 0.034 252 / 0.95) 0%, oklch(21% 0.030 252 / 0.95) 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-soft);
    backdrop-filter: blur(8px);
    overflow: hidden;
  }
  /* hairline highlight at top */
  .card::before{
    content:""; position:absolute; inset:0 0 auto 0; height:1px;
    background: linear-gradient(90deg, transparent, oklch(100% 0 0 / 0.12), transparent);
  }

  .card__head{
    display:flex; align-items:flex-start; justify-content:space-between; gap:16px;
    padding: clamp(20px, 3.4vw, 32px) clamp(20px, 3.4vw, 36px) 0;
  }
  .title{
    margin:0;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(28px, 3.6vw, 40px);
    line-height: 1.1;
    letter-spacing: -0.012em;
  }
  .title em{
    font-style: italic;
    color: var(--accent);
    font-weight: 500;
  }
  .subtitle{
    margin: 6px 0 0;
    color: var(--muted);
    font-size: 14px;
    max-width: 52ch;
  }

  .close{
    width:36px; height:36px; flex:0 0 auto;
    display:grid; place-items:center;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--muted);
    cursor: pointer;
    transition: all .18s ease;
  }
  .close:hover{ color: var(--fg); border-color: var(--border-2); background: oklch(100% 0 0 / 0.02); transform: rotate(90deg) }
  .close svg{ width:14px; height:14px }

  /* progress strip */
  .progress{
    margin: 18px clamp(20px, 3.4vw, 36px) 0;
    display:flex; align-items:center; gap:10px;
    font-family: var(--font-mono);
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted-2);
  }
  .progress .bar{ position:relative; flex:1; height:2px; background: var(--border); border-radius: 999px; overflow:hidden }
  .progress .bar i{ position:absolute; inset:0 auto 0 0; width:0%; background: linear-gradient(90deg, var(--accent-2), var(--accent)); transition: width .35s ease }
  .progress .pct{ min-width: 36px; text-align:right; color: var(--fg) }

  form{
    padding: 22px clamp(20px, 3.4vw, 36px) clamp(20px, 3.4vw, 32px);
    display:grid; gap: 18px;
  }

  fieldset{
    border:none; margin:0; padding: 6px 0 0;
    display:grid; gap: 14px;
  }
  legend{
    padding:0; margin: 0 0 6px;
    font-family: var(--font-mono);
    font-size: 10.5px; letter-spacing: .22em; text-transform: uppercase;
    color: var(--muted-2);
    display:flex; align-items:center; gap:10px; width:100%;
  }
  legend::after{ content:""; flex:1; height:1px; background: var(--border) }

  .row{
    display:grid; gap: 14px;
    grid-template-columns: 1fr 1fr;
  }
  .row.three{ grid-template-columns: 1.2fr 0.6fr 1fr }

  .field{ display:flex; flex-direction:column; gap:6px; position:relative; min-width:0 }
  .field label{
    font-size: 12.5px;
    font-weight: 500;
    letter-spacing: .01em;
    color: var(--muted);
    display:inline-flex; align-items:center; gap:6px;
  }
  .field label .req{ color: var(--accent); font-family: var(--font-mono); font-size: 10px; transform: translateY(-2px) }
  .field .hint{ position:absolute; right:0; top:0; font-family:var(--font-mono); font-size:10.5px; color: var(--muted-2) }

  .input, .select, .textarea{
    width:100%;
    background: var(--field);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: var(--radius-input);
    padding: 13px 14px;
    font: inherit;
    font-size: 14.5px;
    line-height: 1.4;
    transition: border-color .18s ease, background .18s ease, box-shadow .18s ease;
    appearance: none;
    -webkit-appearance: none;
  }
  .input::placeholder, .textarea::placeholder{ color: var(--muted-2) }
  .input:hover, .select:hover, .textarea:hover{ background: var(--field-hov); border-color: var(--border-2) }
  .input:focus, .select:focus, .textarea:focus{
    outline: none;
    background: var(--field-hov);
    border-color: oklch(82% 0.115 88 / 0.65);
    box-shadow: var(--ring);
  }
  .input[data-state="valid"]{ border-color: oklch(72% 0.130 155 / 0.55) }
  .input[aria-invalid="true"]{ border-color: oklch(64% 0.190 25 / 0.7) }

  .select{
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12' fill='none'><path d='M3 4.5l3 3 3-3' stroke='%23B5A47B' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat:no-repeat; background-position: right 14px center; background-size: 12px 12px;
    padding-right: 36px;
  }

  .textarea{ resize: vertical; min-height: 96px; max-height: 280px; line-height: 1.5 }

  .input.with-icon{ padding-left: 40px }
  .icon-left{ position:absolute; left:12px; top: 32px; color: var(--muted-2); pointer-events:none }
  .icon-left svg{ width:16px; height:16px; display:block }

  .error{
    color: var(--danger);
    font-size: 12px;
    margin-top: 2px;
    min-height: 14px;
    font-family: var(--font-mono);
    letter-spacing: .01em;
  }

  /* footer */
  .foot{
    display:flex; align-items:center; gap:14px; justify-content:space-between;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    margin-top: 6px;
  }
  .foot__note{
    font-family: var(--font-mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted-2);
    display:inline-flex; align-items:center; gap:8px;
  }
  .foot__note .key{
    border:1px solid var(--border); border-radius:6px; padding: 2px 6px; color: var(--muted); font-size:10.5px;
  }
  .actions{ display:flex; gap:10px }

  .btn{
    appearance:none; border:1px solid transparent; cursor:pointer; font: inherit; font-weight: 500;
    padding: 12px 18px; border-radius: 10px; transition: all .18s ease;
    letter-spacing: .005em; font-size: 14px;
    display:inline-flex; align-items:center; gap:10px;
  }
  .btn--ghost{
    background: transparent; color: var(--muted); border-color: var(--border);
  }
  .btn--ghost:hover{ color: var(--fg); border-color: var(--border-2); background: oklch(100% 0 0 / 0.02) }

  .btn--primary{
    position:relative;
    background: linear-gradient(180deg, oklch(86% 0.10 88) 0%, oklch(76% 0.14 80) 100%);
    color: var(--accent-ink);
    border-color: oklch(70% 0.13 78);
    box-shadow:
      0 1px 0 oklch(100% 0 0 / 0.45) inset,
      0 0 0 1px oklch(60% 0.12 70 / 0.25),
      0 10px 24px -10px oklch(74% 0.135 78 / 0.55);
    font-weight: 600;
  }
  .btn--primary::after{
    content:""; position:absolute; inset:0; border-radius: inherit; pointer-events:none;
    background: linear-gradient(180deg, oklch(100% 0 0 / 0.20), transparent 40%);
    opacity:.6;
  }
  .btn--primary:hover{ transform: translateY(-1px); box-shadow: 0 1px 0 oklch(100% 0 0 / 0.45) inset, 0 0 0 1px oklch(60% 0.12 70 / 0.35), 0 16px 32px -10px oklch(74% 0.135 78 / 0.7) }
  .btn--primary:active{ transform: translateY(0) }

  /* meta strip below card */
  .meta{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    margin: 14px 6px 0;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted-2);
  }
  .meta .save{ display:inline-flex; align-items:center; gap:8px }
  .meta .save i{ width:6px; height:6px; border-radius:999px; background: var(--ok); box-shadow: 0 0 0 4px oklch(72% 0.130 155 / 0.14) }

  /* responsive */
  @media (max-width: 720px){
    .row{ grid-template-columns: 1fr }
    .row.three{ grid-template-columns: 1fr 1fr }
    .row.three .field:first-child{ grid-column: 1 / -1 }
    .card__head{ padding-top: 22px }
    .foot{ flex-direction: column-reverse; align-items: stretch; gap: 10px }
    .actions{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px }
    .btn{ justify-content:center }
    .foot__note{ justify-content:center }
  }
  @media (max-width: 420px){
    body{ padding: 0 }
    .stage{ width:100% }
    .card{ border-radius: 0; min-height: 100svh; box-shadow:none }
    .eyebrow, .meta{ display:none }
  }

  /* prefers-reduced-motion */
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{ transition: none !important; animation: none !important }
  }
</style>
</head>
<body>
  <main class="stage">
    <div class="eyebrow">
      <span class="dot" aria-hidden="true"></span>
      <span>Painel · Cadastro</span>
      <span class="grow"></span>
      <span>nº 0428 — 11.05.2026</span>
    </div>

    <section class="card" role="dialog" aria-labelledby="title" aria-modal="false">
      <header class="card__head">
        <div>
          <h1 id="title" class="title">Novo <em>Cliente</em></h1>
          <p class="subtitle">Cadastre um cliente em sua carteira. Campos marcados com <span style="color:var(--accent)">•</span> são obrigatórios.</p>
        </div>
        <button type="button" class="close" aria-label="Fechar">
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </header>

      <div class="progress" aria-hidden="true">
        <span>Preenchimento</span>
        <span class="bar"><i id="bar"></i></span>
        <span class="pct" id="pct">0%</span>
      </div>

      <form id="form" novalidate autocomplete="on">
        <fieldset>
          <legend>Identificação</legend>

          <div class="field">
            <label for="nome">Nome completo <span class="req" aria-hidden="true">•</span></label>
            <input class="input" id="nome" name="nome" type="text" placeholder="Ex.: Helena Aparecida Martins" required autocomplete="name" />
            <span class="error" data-for="nome"></span>
          </div>

          <div class="row">
            <div class="field">
              <label for="doc">CPF / CNPJ <span class="req" aria-hidden="true">•</span></label>
              <input class="input" id="doc" name="doc" type="text" inputmode="numeric" placeholder="000.000.000-00" maxlength="18" required />
              <span class="error" data-for="doc"></span>
            </div>
            <div class="field">
              <label for="telefone">Telefone</label>
              <input class="input" id="telefone" name="telefone" type="tel" inputmode="numeric" placeholder="(11) 99999-0000" maxlength="15" autocomplete="tel" />
              <span class="error" data-for="telefone"></span>
            </div>
          </div>

          <div class="field">
            <label for="email">E-mail <span class="req" aria-hidden="true">•</span></label>
            <input class="input" id="email" name="email" type="email" placeholder="helena@empresa.com.br" required autocomplete="email" />
            <span class="error" data-for="email"></span>
          </div>
        </fieldset>

        <fieldset>
          <legend>Endereço</legend>

          <div class="row">
            <div class="field">
              <label for="cep">CEP</label>
              <span class="hint" id="cep-status"></span>
              <input class="input" id="cep" name="cep" type="text" inputmode="numeric" placeholder="00000-000" maxlength="9" autocomplete="postal-code" />
              <span class="error" data-for="cep"></span>
            </div>
            <div class="field">
              <label for="estado">Estado</label>
              <select class="select" id="estado" name="estado" autocomplete="address-level1">
                <option value="">Selecione…</option>
                <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
                <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
                <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
                <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
                <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
                <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
                <option>SP</option><option>SE</option><option>TO</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="endereco">Logradouro</label>
            <input class="input" id="endereco" name="endereco" type="text" placeholder="Rua, avenida ou alameda" autocomplete="street-address" />
          </div>

          <div class="row three">
            <div class="field">
              <label for="cidade">Cidade</label>
              <input class="input" id="cidade" name="cidade" type="text" placeholder="São Paulo" autocomplete="address-level2" />
            </div>
            <div class="field">
              <label for="numero">Número</label>
              <input class="input" id="numero" name="numero" type="text" inputmode="numeric" placeholder="123" />
            </div>
            <div class="field">
              <label for="complemento">Complemento</label>
              <input class="input" id="complemento" name="complemento" type="text" placeholder="Apto, sala, bloco" />
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>Observações</legend>
          <div class="field">
            <label for="obs">Notas internas</label>
            <span class="hint"><span id="obs-count">0</span> / 500</span>
            <textarea class="textarea" id="obs" name="obs" maxlength="500" placeholder="Preferências de contato, segmento, histórico relevante…"></textarea>
          </div>
        </fieldset>

        <footer class="foot">
          <span class="foot__note">
            <span class="key">⏎</span>
            Enviar com Enter · <span class="key">Esc</span> cancelar
          </span>
          <div class="actions">
            <button type="button" class="btn btn--ghost" id="cancel">Cancelar</button>
            <button type="submit" class="btn btn--primary" id="submit">
              <span>Criar cliente</span>
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </footer>
      </form>
    </section>

    <div class="meta">
      <span class="save"><i aria-hidden="true"></i> Rascunho salvo automaticamente</span>
      <span>ENC · v1.4</span>
    </div>
  </main>

<script>
(() => {
  const $ = (q, r=document) => r.querySelector(q);
  const $$ = (q, r=document) => Array.from(r.querySelectorAll(q));

  const form = $('#form');
  const bar = $('#bar');
  const pct = $('#pct');
  const obs = $('#obs');
  const obsCount = $('#obs-count');
  const cep = $('#cep');
  const cepStatus = $('#cep-status');

  // ---- Masks ----
  const onlyDigits = v => (v||'').replace(/\D+/g,'');

  function maskDoc(v){
    const d = onlyDigits(v).slice(0,14);
    if (d.length <= 11){
      // CPF: 000.000.000-00
      return d
        .replace(/^(\d{3})(\d)/, '$1.$2')
        .replace(/^(\d{3})\.(\d{3})(\d)/, '$1.$2.$3')
        .replace(/\.(\d{3})(\d)/, '.$1-$2');
    }
    // CNPJ: 00.000.000/0000-00
    return d
      .replace(/^(\d{2})(\d)/, '$1.$2')
      .replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3')
      .replace(/\.(\d{3})(\d)/, '.$1/$2')
      .replace(/(\d{4})(\d)/, '$1-$2');
  }

  function maskPhone(v){
    const d = onlyDigits(v).slice(0,11);
    if (d.length <= 10){
      return d.replace(/^(\d{2})(\d)/, '($1) $2').replace(/(\d{4})(\d)/, '$1-$2');
    }
    return d.replace(/^(\d{2})(\d)/, '($1) $2').replace(/(\d{5})(\d)/, '$1-$2');
  }

  function maskCep(v){
    return onlyDigits(v).slice(0,8).replace(/^(\d{5})(\d)/, '$1-$2');
  }

  function attachMask(el, fn){
    el.addEventListener('input', () => {
      const start = el.selectionStart;
      const before = el.value.length;
      el.value = fn(el.value);
      const after = el.value.length;
      try { el.setSelectionRange(start + (after-before), start + (after-before)); } catch(_){}
    });
  }

  attachMask($('#doc'), maskDoc);
  attachMask($('#telefone'), maskPhone);
  attachMask(cep, maskCep);

  // ---- Validation (lightweight) ----
  function isEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v) }
  function isCPF(v){ return onlyDigits(v).length === 11 }
  function isCNPJ(v){ return onlyDigits(v).length === 14 }

  const rules = {
    nome:     v => v.trim().length >= 2 || 'Informe o nome completo',
    doc:      v => isCPF(v) || isCNPJ(v) || 'Documento incompleto',
    telefone: v => !v || onlyDigits(v).length >= 10 || 'Telefone incompleto',
    email:    v => isEmail(v.trim()) || 'E-mail inválido',
    cep:      v => !v || onlyDigits(v).length === 8 || 'CEP incompleto'
  };

  function validateField(id){
    const el = document.getElementById(id);
    if (!el) return true;
    const msgEl = document.querySelector(`.error[data-for="${id}"]`);
    const rule = rules[id];
    if (!rule) return true;
    const result = rule(el.value);
    if (result === true){
      el.removeAttribute('aria-invalid');
      if (el.value.trim()) el.dataset.state = 'valid'; else delete el.dataset.state;
      if (msgEl) msgEl.textContent = '';
      return true;
    } else {
      el.setAttribute('aria-invalid','true');
      delete el.dataset.state;
      if (msgEl) msgEl.textContent = result;
      return false;
    }
  }

  Object.keys(rules).forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('blur', () => validateField(id));
    el.addEventListener('input', () => {
      if (el.getAttribute('aria-invalid') === 'true') validateField(id);
      updateProgress();
    });
  });

  // ---- Progress bar ----
  const tracked = ['nome','doc','email','telefone','cep','endereco','numero','cidade','estado','obs'];
  function updateProgress(){
    let filled = 0;
    tracked.forEach(id => {
      const el = document.getElementById(id);
      if (el && String(el.value).trim().length > 0) filled++;
    });
    const p = Math.round((filled / tracked.length) * 100);
    bar.style.width = p + '%';
    pct.textContent = p + '%';
  }

  // ---- Obs counter ----
  obs.addEventListener('input', () => { obsCount.textContent = String(obs.value.length); updateProgress() });

  // ---- CEP autofill (ViaCEP, fails silently) ----
  cep.addEventListener('blur', async () => {
    const d = onlyDigits(cep.value);
    if (d.length !== 8) return;
    cepStatus.textContent = 'Buscando…';
    try{
      const r = await fetch(`https://viacep.com.br/ws/${d}/json/`, { mode:'cors' });
      if (!r.ok) throw new Error();
      const j = await r.json();
      if (j.erro) { cepStatus.textContent = 'Não encontrado'; return; }
      if (!$('#endereco').value) $('#endereco').value = j.logradouro || '';
      if (!$('#cidade').value)   $('#cidade').value   = j.localidade || '';
      if (!$('#estado').value)   $('#estado').value   = j.uf || '';
      cepStatus.textContent = 'Preenchido';
      setTimeout(() => cepStatus.textContent = '', 1800);
      updateProgress();
    } catch(_){
      cepStatus.textContent = '';
    }
  });

  // ---- Persist draft ----
  const KEY = 'novo-cliente:draft';
  try {
    const saved = JSON.parse(localStorage.getItem(KEY) || 'null');
    if (saved){
      Object.entries(saved).forEach(([k,v]) => {
        const el = document.getElementById(k);
        if (el && v != null) el.value = v;
      });
      obsCount.textContent = String(($('#obs').value||'').length);
    }
  } catch(_){}

  form.addEventListener('input', () => {
    const data = {};
    new FormData(form).forEach((v,k) => data[k] = v);
    try { localStorage.setItem(KEY, JSON.stringify(data)) } catch(_){}
  });

  // ---- Submit / cancel ----
  $('#cancel').addEventListener('click', () => {
    if (form.checkValidity?.() && !confirm('Descartar este cadastro?')) return;
    form.reset();
    try { localStorage.removeItem(KEY) } catch(_){}
    updateProgress();
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const ok = ['nome','doc','email','telefone','cep'].every(validateField);
    if (!ok){
      const firstInvalid = form.querySelector('[aria-invalid="true"]');
      firstInvalid?.focus();
      return;
    }
    const btn = $('#submit');
    btn.disabled = true;
    btn.innerHTML = '<span>Criando…</span>';
    setTimeout(() => {
      btn.innerHTML = '<span>Cliente criado ✓</span>';
      try { localStorage.removeItem(KEY) } catch(_){}
      setTimeout(() => {
        btn.disabled = false;
        btn.innerHTML = '<span>Criar cliente</span><svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      }, 1400);
    }, 700);
  });

  // ---- Keyboard ----
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') $('#cancel').click();
  });

  updateProgress();
})();
</script>
</body>
</html>
