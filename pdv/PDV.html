<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GestãoPRO — Ponto de Venda</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="styles.css"/>
<style>
  /* Scanner suggestions dropdown */
  .scan { position: relative; }
  .scan-sugg {
    position: absolute; left: 70px; right: 16px; top: calc(100% + 6px);
    background: var(--surf); border: 1px solid var(--line-2); border-radius: 14px;
    padding: 6px; z-index: 30;
    box-shadow: 0 14px 40px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.03) inset;
    animation: dropIn .18s ease-out;
  }
  @keyframes dropIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .scan-sugg-row {
    display: flex; align-items: center; gap: 12px; width: 100%;
    background: transparent; border: 0; padding: 9px 12px; border-radius: 9px; cursor: pointer;
    color: var(--t1); font-family: inherit; font-size: 13px; text-align: left;
  }
  .scan-sugg-row:hover, .scan-sugg-row:focus { background: var(--surf-2); outline: none; }
  .scan-sugg-icon {
    width: 26px; height: 26px; border-radius: 7px; background: var(--surf-2);
    display: grid; place-items: center; color: var(--accent);
  }
  .scan-sugg-name { flex: 1; }
  .scan-sugg-price { color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums; margin-right: 4px; }

  .money .cur { color: var(--t3); font-weight: 500; margin-right: 4px; }
  .money .cents { color: var(--t3); }
  .money-lg { font-size: 38px; }

  /* Better scrollbar in webkit */
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: var(--line-3); border-radius: 4px; }
  *::-webkit-scrollbar-thumb:hover { background: var(--t4); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="cart.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
