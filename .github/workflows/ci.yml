# CI minimo: roda em todo push/PR na main. O deploy da Vercel e git-connected
# e NAO espera este workflow — para o CI BLOQUEAR merge/deploy e preciso
# ativar Branch Protection (Settings > Branches > require status checks)
# no GitHub. Mesmo sem isso, o badge vermelho avisa que a main quebrou.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  backend:
    name: Backend (testes)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      # postinstall roda `prisma generate` (so precisa do schema, nao do banco).
      - run: npm ci
      # 80+ testes puros (fiscal, sugestoes, zod, totp) — sem DATABASE_URL.
      - run: npm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Banco demo_e2e e UM so (Neon): dois runs simultaneos se atropelariam no
    # db push/seed. Serializa por branch; run novo cancela o anterior.
    concurrency:
      group: e2e-demo-db
      cancel-in-progress: true
    # Informativo por enquanto: NAO esta nos required checks da branch
    # protection — falha aqui avisa, nao bloqueia. Sem o secret
    # TEST_DATABASE_URL o job vira no-op verde (nao quebra fork/PR externo).
    env:
      E2E_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      # Ambiente de teste — nao e o segredo de producao.
      JWT_SECRET: e2e-ci-jwt-nao-e-producao
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Aviso quando nao ha banco de teste
        if: env.E2E_DATABASE_URL == ''
        run: echo "Secret TEST_DATABASE_URL ausente — E2E pulado."
      - uses: actions/setup-node@v4
        if: env.E2E_DATABASE_URL != ''
        with:
          node-version: 22
          cache: npm
      - if: env.E2E_DATABASE_URL != ''
        run: npm ci
      - if: env.E2E_DATABASE_URL != ''
        run: npm --prefix backend ci
      - if: env.E2E_DATABASE_URL != ''
        run: npx playwright install chromium --with-deps
      # global-setup prepara o demo_e2e (db push + seed) e o proprio
      # Playwright sobe backend (3335) e vite (5175).
      - if: env.E2E_DATABASE_URL != ''
        run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
